AWSTemplateFormatVersion: '2010-09-09'    
Description: IAM Role for Codepipeline

Resources:
  CodePipelineIamRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mtier-codepipeline-role
      Description: Custom Iam role that grant access to Amazon S3 (for artifacts)
      AssumeRolePolicyDocument: 
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole 
      Policies:
        - PolicyName: codepipeline-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codepipeline:GetPipeline
                  - codepipeline:GetPipelineState
                  - codepipeline:ListActionTypes
                  - codepipeline:ListPipelines
                  - codepipeline:PutJobFailureResult
                  - codepipeline:PutJobSuccessResult
                Resource: "*"
        - PolicyName: s3-pipeline-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                Resource: 
                  - !ImportValue mtier:PipelineArtifactsBucketArn
                  - !Sub
                    - "${BucketArn}/*"
                    - BucketArn: !ImportValue mtier:PipelineArtifactsBucketArn
        - PolicyName: codebuild-pipeline-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !ImportValue mtier:CodeBuildProjectArn
        - PolicyName: codestar-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: arn:aws:codeconnections:us-east-1:339298461301:connection/648bb669-0fbd-473a-9fb2-52f49fede3ec
        
  AppPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: app-pipeline
      ArtifactStore: 
        Type: S3
        Location: !ImportValue mtier:PipelineArtifactsBucketName
      PipelineType: V2   
      RoleArn: !GetAtt CodePipelineIamRole.Arn
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: arn:aws:codeconnections:us-east-1:339298461301:connection/648bb669-0fbd-473a-9fb2-52f49fede3ec
                FullRepositoryId: Clarence-asu/aws-cicd-pipeline
                BranchName: main
              OutputArtifacts:
                - Name: SourceOutput
        - Name: Build
          Actions:
            - Name: BuildAction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: mtier-codebuild-project
              InputArtifacts:
                - Name: SourceOutput
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: SourceAction
            Push:
              - Branches:
                  Includes:
                    - main