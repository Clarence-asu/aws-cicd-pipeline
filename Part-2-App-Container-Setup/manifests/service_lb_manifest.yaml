apiVersion: v1
kind: Service
metadata:
  labels:
    app: my-lb
  name: my-lb
  namespace: dev
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-security-groups: "LB_SG_PLACEHOLDER"
spec:
  ports:
  - name: 80-80
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: my-app
  type: LoadBalancer
